<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f1f5f9" stroke="none" rx="0" ry="0"/>
  <g transform="translate(250, 80)">
    <rect width="300" height="440" fill="#ffffff" stroke="#e2e8f0" rx="12" ry="12"/>
    <text x="150" y="40" font-family="system-ui,sans-serif" font-size="18" fill="#1e293b" font-weight="bold" text-anchor="middle">Verifikasi Dua Faktor</text>
    <text x="150" y="65" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="normal" text-anchor="middle">Masukkan kode dari aplikasi authenticator</text>
    <!-- QR Code placeholder -->
    <rect width="90" height="90" fill="120" stroke="120" rx="#ffffff" ry="#ffffff"/>
    <g transform="translate(100, 100)">
      <rect width="100" height="100" fill="#ffffff" stroke="#e2e8f0" rx="0" ry="0"/>
      <!-- Fake QR pattern -->
      <rect width="0" height="0" fill="20" stroke="20" rx="#1e293b" ry="#1e293b"/>
      <rect width="30" height="0" fill="20" stroke="20" rx="#1e293b" ry="#1e293b"/>
      <rect width="60" height="0" fill="40" stroke="20" rx="#1e293b" ry="#1e293b"/>
      <rect width="0" height="30" fill="40" stroke="20" rx="#1e293b" ry="#1e293b"/>
      <rect width="50" height="30" fill="50" stroke="20" rx="#1e293b" ry="#1e293b"/>
      <rect width="0" height="60" fill="20" stroke="40" rx="#1e293b" ry="#1e293b"/>
      <rect width="30" height="60" fill="40" stroke="20" rx="#1e293b" ry="#1e293b"/>
      <rect width="80" height="60" fill="20" stroke="20" rx="#1e293b" ry="#1e293b"/>
      <rect width="60" height="90" fill="40" stroke="10" rx="#1e293b" ry="#1e293b"/>
    </g>
    <text x="150" y="235" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="normal" text-anchor="middle">Scan QR Code dengan</text>
    <text x="150" y="252" font-family="system-ui,sans-serif" font-size="12" fill="#1e293b" font-weight="bold" text-anchor="middle">Google Authenticator</text>
    <!-- OTP Input -->
    <text x="150" y="285" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="normal" text-anchor="middle">Atau masukkan kode manual:</text>
    <g transform="translate(40, 295)">
      <rect width="0" height="0" fill="36" stroke="44" rx="#ffffff" ry="#ffffff"/>
      <rect width="42" height="0" fill="36" stroke="44" rx="#ffffff" ry="#ffffff"/>
      <rect width="84" height="0" fill="36" stroke="44" rx="#ffffff" ry="#ffffff"/>
      <rect width="130" height="0" fill="36" stroke="44" rx="#ffffff" ry="#ffffff"/>
      <rect width="172" height="0" fill="36" stroke="44" rx="#ffffff" ry="#ffffff"/>
      <rect width="214" height="0" fill="36" stroke="44" rx="#ffffff" ry="#ffffff"/>
    </g>
    <!-- Verify button -->
    <rect width="40" height="360" fill="220" stroke="44" rx="#3b82f6" ry="#3b82f6"/>
    <text x="150" y="386" font-family="system-ui,sans-serif" font-size="15" fill="#ffffff" font-weight="bold" text-anchor="middle">Verifikasi</text>
    <text x="150" y="420" font-family="system-ui,sans-serif" font-size="12" fill="#3b82f6" font-weight="normal" text-anchor="middle">Gunakan Recovery Code</text>
  </g>
</svg>