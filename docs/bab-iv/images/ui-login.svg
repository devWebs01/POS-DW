<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f1f5f9" stroke="none" rx="0" ry="0"/>
  <!-- Card -->
  <g transform="translate(250, 100)">
    <rect width="300" height="400" fill="#ffffff" stroke="#e2e8f0" rx="12" ry="12"/>
    <!-- Logo area -->
    <circle cx="150" cy="50" r="30" fill="#6366f1" opacity="0.1"/>
    <text x="150" y="58" font-family="system-ui,sans-serif" font-size="24" fill="#6366f1" font-weight="bold" text-anchor="middle">POS</text>
    <text x="150" y="100" font-family="system-ui,sans-serif" font-size="18" fill="#1e293b" font-weight="bold" text-anchor="middle">Masuk ke Akun Anda</text>
    <!-- Email -->
    <text x="30" y="140" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="normal" text-anchor="start">Email</text>
    <rect width="240" height="40" fill="#ffffff" stroke="#e2e8f0" rx="8" ry="8"/>
    <g transform="translate(40, 145)"><rect width="220" height="36" fill="#f8fafc" stroke="#e2e8f0" rx="6" ry="6"/></g>
    <text x="50" y="168" font-family="system-ui,sans-serif" font-size="13" fill="#cbd5e1" font-weight="normal" text-anchor="start">admin@example.com</text>
    <!-- Password -->
    <text x="30" y="210" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="normal" text-anchor="start">Password</text>
    <g transform="translate(40, 215)"><rect width="220" height="36" fill="#f8fafc" stroke="#e2e8f0" rx="6" ry="6"/></g>
    <text x="50" y="238" font-family="system-ui,sans-serif" font-size="13" fill="#cbd5e1" font-weight="normal" text-anchor="start">••••••••••</text>
    <!-- Remember me -->
    <rect width="40" height="270" fill="16" stroke="16" rx="#ffffff" ry="#ffffff"/>
    <text x="18" y="278" font-size="12" fill="#94a3b8" font-family="system-ui,sans-serif">✓</text>
    <text x="62" y="282" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="normal" text-anchor="start">Ingat saya</text>
    <!-- Login button -->
    <rect width="40" height="300" fill="220" stroke="44" rx="#3b82f6" ry="#3b82f6"/>
    <text x="150" y="326" font-family="system-ui,sans-serif" font-size="15" fill="#ffffff" font-weight="bold" text-anchor="middle">Masuk</text>
    <!-- Links -->
    <text x="150" y="360" font-family="system-ui,sans-serif" font-size="12" fill="#3b82f6" font-weight="normal" text-anchor="middle">Lupa password?</text>
    <text x="150" y="385" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="normal" text-anchor="middle">Belum punya akun? Daftar</text>
  </g>
</svg>